<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrows 2026 Academic Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); table-layout: fixed; width: 100%; }
        .day-cell { min-height: 120px; transition: all 0.2s; border: 1px solid #e2e8f0; overflow: hidden; }
        
        /* 일정 태그 스타일 수정: 줄바꿈 허용 및 폭 제한 */
        .event-tag { 
            font-size: 0.7rem; 
            padding: 2px 6px; 
            border-radius: 4px; 
            margin-bottom: 3px; 
            cursor: pointer; 
            line-height: 1.2;
            word-break: keep-all; /* 단어 단위 줄바꿈 */
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 최대 2줄 표시 */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 기간 중 첫날이 아닌 날의 배경 스타일 */
        .event-duration-bg {
            height: 8px;
            margin-bottom: 2px;
            border-radius: 2px;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .event-duration-bg:hover {
            opacity: 0.6;
        }

        .event-holiday { background-color: #fee2e2; color: #991b1b; border-left: 3px solid #ef4444; }
        .event-exam { background-color: #dbeafe; color: #1e40af; border-left: 3px solid #3b82f6; }
        .event-default { background-color: #f1f5f9; color: #334155; border-left: 3px solid #94a3b8; }
        .event-special { background-color: #fef3c7; color: #92400e; border-left: 3px solid #f59e0b; }
        
        /* 기간 표시용 배경색 */
        .bg-holiday-dim { background-color: #ef4444; }
        .bg-exam-dim { background-color: #3b82f6; }
        .bg-special-dim { background-color: #f59e0b; }
        .bg-default-dim { background-color: #94a3b8; }

        /* Yearly view: 4 cols, row pairs = 4 calendars then 4 event lists */
        .yearly-month { background: white; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .yearly-month-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .yearly-day-cell { min-height: 28px; font-size: 0.65rem; padding: 2px; border: 1px solid #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; cursor: default; }
        .yearly-day-cell.has-event { cursor: pointer; }
        .yearly-day-cell .day-num { font-weight: 600; color: #64748b; }
        .yearly-day-cell.has-event { position: relative; }
        .yearly-day-cell .color-bars { position: absolute; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column-reverse; gap: 1px; align-items: stretch; }
        .yearly-day-cell .color-bar { height: 2px; border-radius: 1px; flex: 1; min-height: 2px; }
        .yearly-day-cell .color-bar.holiday { background: #ef4444; }
        .yearly-day-cell .color-bar.exam { background: #3b82f6; }
        .yearly-day-cell .color-bar.special { background: #f59e0b; }
        .yearly-day-cell .color-bar.default { background: #94a3b8; }
        .yearly-combined-grid { display: grid; grid-template-columns: repeat(4, 1fr); column-gap: 1rem; row-gap: 0.25rem; }
        .yearly-month-events { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; font-size: 0.65rem; max-height: 140px; overflow-y: auto; margin-bottom: 1rem; }
        .yearly-month-events .event-item { display: flex; align-items: flex-start; gap: 6px; padding: 4px 6px; cursor: pointer; border-radius: 4px; }
        .yearly-month-events .event-item:hover { background: #f1f5f9; }
        .yearly-month-events .event-color { flex-shrink: 0; width: 6px; height: 14px; border-radius: 2px; margin-top: 2px; }
        .yearly-month-events .event-text { flex: 1; min-width: 0; line-height: 1.3; }
        .yearly-month-events .event-date { color: #64748b; font-size: 0.6rem; white-space: nowrap; }

        /* Legend type filter (custom checkbox) */
        .legend-toggle { cursor: pointer; user-select: none; }
        .legend-toggle:hover { opacity: 0.85; }
        .legend-icon-wrap { position: relative; width: 12px; height: 12px; flex-shrink: 0; overflow: visible; }
        .legend-icon-wrap .legend-color { display: block; width: 100%; height: 100%; border-radius: 4px; }
        .legend-icon-wrap .legend-check { position: absolute; inset: -6px; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; transition: opacity 0.15s; color: #475569; font-size: 20px; font-weight: bold; transform: translate(1px, -6px); }
        .legend-icon-wrap.checked .legend-check { opacity: 1; }

        @media (max-width: 1024px) { .yearly-combined-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) {
            .yearly-combined-grid { grid-template-columns: 1fr; }
            .yearly-month { order: calc(var(--month-index, 0) * 2); }
            .yearly-month-events { order: calc(var(--month-index, 0) * 2 + 1); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Arrows Academic Calendar 2026</h1>
            <p class="text-slate-500 font-medium">School Schedule (Updated 03-03-2026)</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-4">
            <select id="schoolLevel" class="bg-white border border-slate-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="primary">Primary</option>
                <option value="secondary" selected>Secondary</option>
            </select>
            <select id="yearFilter" class="bg-white border border-slate-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="All">All Years</option>
                <option value="Year 7">Year 7</option>
                <option value="Year 8">Year 8</option>
                <option value="Year 9">Year 9</option>
                <option value="Year 10">Year 10</option>
                <option value="Year 11">Year 11</option>
            </select>
            <select id="viewMode" class="bg-white border border-slate-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="monthly">Monthly</option>
                <option value="yearly" selected>Yearly</option>
            </select>
            <div id="monthNav" class="flex border rounded-lg overflow-hidden bg-white shadow-sm">
                <button onclick="changeMonth(-1)" class="px-4 py-2 hover:bg-slate-50 border-r transition">&lt;</button>
                <div id="currentMonthDisplay" class="px-6 py-2 font-bold min-w-[140px] text-center text-slate-700">January 2026</div>
                <button onclick="changeMonth(1)" class="px-4 py-2 hover:bg-slate-50 border-l transition">&gt;</button>
            </div>
        </div>
    </div>

    <!-- Legend (click to toggle event type visibility) -->
    <div class="flex flex-wrap gap-6 mb-6 text-xs font-semibold uppercase tracking-wider text-slate-500">
        <div class="legend-toggle flex items-center gap-2" data-type="holiday" onclick="toggleTypeFilter('holiday')">
            <div class="legend-icon-wrap checked" id="legend-holiday">
                <span class="legend-color bg-red-500"></span>
                <span class="legend-check">✓</span>
            </div>
            Holidays/Breaks
        </div>
        <div class="legend-toggle flex items-center gap-2" data-type="exam" onclick="toggleTypeFilter('exam')">
            <div class="legend-icon-wrap checked" id="legend-exam">
                <span class="legend-color bg-blue-500"></span>
                <span class="legend-check">✓</span>
            </div>
            Exams/Assessments
        </div>
        <div class="legend-toggle flex items-center gap-2" data-type="special" onclick="toggleTypeFilter('special')">
            <div class="legend-icon-wrap checked" id="legend-special">
                <span class="legend-color bg-amber-500"></span>
                <span class="legend-check">✓</span>
            </div>
            Events/Camps
        </div>
        <div class="legend-toggle flex items-center gap-2" data-type="default" onclick="toggleTypeFilter('default')">
            <div class="legend-icon-wrap checked" id="legend-default">
                <span class="legend-color bg-slate-400"></span>
                <span class="legend-check">✓</span>
            </div>
            General Schedule
        </div>
    </div>

    <!-- Monthly Calendar -->
    <div id="monthlyView" class="hidden bg-white rounded-xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="calendar-grid bg-slate-50 border-b border-slate-200">
            <div class="py-4 text-center font-bold text-red-500 text-xs">SUN</div>
            <div class="py-4 text-center font-bold text-slate-500 text-xs">MON</div>
            <div class="py-4 text-center font-bold text-slate-500 text-xs">TUE</div>
            <div class="py-4 text-center font-bold text-slate-500 text-xs">WED</div>
            <div class="py-4 text-center font-bold text-slate-500 text-xs">THU</div>
            <div class="py-4 text-center font-bold text-slate-500 text-xs">FRI</div>
            <div class="py-4 text-center font-bold text-blue-500 text-xs">SAT</div>
        </div>
        <div id="calendarDays" class="calendar-grid">
            <!-- JS Renders Here -->
        </div>
    </div>

    <!-- Yearly Calendar: each row = 4 calendars, next row = 4 event lists -->
    <div id="yearlyView">
        <div id="yearlyCombinedGrid" class="yearly-combined-grid">
            <!-- JS Renders: Jan-Feb-Mar-Apr calendars, then Jan-Feb-Mar-Apr events, then May-Jun-Jul-Aug calendars, etc. -->
        </div>
    </div>
</div>

<!-- Modal -->
<div id="eventModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl max-w-sm w-full p-8 shadow-2xl border border-slate-100">
        <h3 id="modalTitle" class="text-2xl font-bold text-slate-800 mb-2"></h3>
        <div id="modalDate" class="inline-block bg-blue-50 text-blue-700 text-sm font-bold px-3 py-1 rounded-full mb-6"></div>
        <div id="modalDesc" class="text-slate-600 mb-8 space-y-3"></div>
        <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700 transition shadow-lg shadow-slate-200">OK</button>
    </div>
</div>

<script src="academic_events.js"></script>
<script src="calendar.js"></script>
</body>
</html>
